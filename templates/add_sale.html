{% extends "base.html" %}

{% block extra_css %}
<style>
    .select2-container .select2-selection--single { height: 45px; }
    .select2-container--bootstrap-5 .select2-selection { font-size: 1rem; }
    .btn-large { padding: 12px; font-size: 1.1rem; }
    .alert-expiry { color: #d63384; font-weight: bold; font-size: 0.9rem; margin-top: 5px; }
</style>
{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-9 mx-auto">
        <div class="d-flex align-items-center mb-3">
            <a href="{{ url_for('sales.sales_report') }}" class="btn btn-light rounded-circle me-3"><i class="fas fa-arrow-left"></i></a>
            <h2 class="fw-bold mb-0">Professional Sales Entry</h2>
        </div>
        
        <div class="card border-0 shadow-sm border-radius-12">
            <div class="card-body p-4">
                <form method="POST" id="salesForm">
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label fw-semibold">Customer Name</label>
                            <input type="text" class="form-control form-control-lg" name="customer_name" placeholder="Enter Customer Name" required>
                        </div>
                        
                        <div class="col-md-8">
                            <label class="form-label fw-semibold">Search Product (Name/Code)</label>
                            <select class="form-select select2" name="product_id" id="product_id" required>
                                <option value="" disabled selected>Search for a product...</option>
                                {% for product in products %}
                                <option value="{{ product.id }}">{{ product.product_name }} ({{ product.pack }}) - {{ product.product_code }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Invoice Number</label>
                            <input type="text" class="form-control bg-light" name="invoice_no" value="{{ next_inv }}">
                        </div>

                        <div class="col-md-5">
                            <label class="form-label fw-semibold">Batch Number (FIFO Auto-Select)</label>
                            <select class="form-select" name="batch_no" id="batch_select" required>
                                <option value="">Select Product First</option>
                            </select>
                            <div id="expiry_warning" class="alert-expiry d-none">
                                <i class="fas fa-triangle-exclamation"></i> This batch expires within 2 months! ★
                            </div>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Expiry Date</label>
                            <input type="text" class="form-control bg-light" id="expiry_display" readonly>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Transaction Date</label>
                            <input type="date" class="form-control" name="date" value="{{ today }}">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Quantity</label>
                            <input type="number" class="form-control form-control-lg" name="quantity" id="qty" placeholder="0" required>
                            <div id="stock_info" class="form-text text-primary fw-bold"></div>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Free Quantity</label>
                            <input type="number" class="form-control form-control-lg" name="free_quantity" value="0">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Rate (PTS Price)</label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text">₹</span>
                                <input type="number" step="0.01" class="form-control" name="rate" id="rate" required>
                            </div>
                        </div>

                        <div class="col-md-12">
                            <div class="card bg-light border-0">
                                <div class="card-body py-2 d-flex justify-content-between align-items-center">
                                    <span class="fw-semibold text-muted">Total Transaction Value</span>
                                    <h3 class="fw-bold text-primary mb-0">₹ <span id="total_display">0.00</span></h3>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 mt-4 text-end">
                            <button type="reset" class="btn btn-light btn-lg me-2 px-4">Reset</button>
                            <button type="submit" class="btn btn-primary btn-lg px-5 shadow-sm">
                                <i class="fas fa-check-circle me-2"></i>Save & Print
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    $(document).ready(function() {
        // Initialize Select2
        $('.select2').select2({
            theme: 'bootstrap-5',
            width: '100%'
        });

        const productSelect = $('#product_id');
        const batchSelect = $('#batch_select');
        const expiryDisplay = $('#expiry_display');
        const expiryWarning = $('#expiry_warning');
        const qtyInput = $('#qty');
        const rateInput = $('#rate');
        const totalDisplay = $('#total_display');
        const stockInfo = $('#stock_info');

        productSelect.on('change', function() {
            const product_id = $(this).val();
            if (!product_id) return;

            // Clear previous
            batchSelect.empty().append('<option value="">Loading batches...</option>');
            stockInfo.text('');
            expiryWarning.addClass('d-none');

            // Fetch batches
            $.getJSON(`/api/product-batches/${product_id}`, function(data) {
                batchSelect.empty();
                
                if (data.batches.length === 0) {
                    batchSelect.append('<option value="">OUT OF STOCK</option>');
                    rateInput.val(data.pts_price);
                    return;
                }

                data.batches.forEach((b, index) => {
                    const alert = b.expiry_warning ? ' ★' : '';
                    const option = $(`<option value="${b.batch_no}">${b.batch_no} (Exp: ${b.expiry_date})${alert}</option>`);
                    option.data('expiry', b.expiry_date);
                    option.data('stock', b.stock);
                    option.data('warning', b.expiry_warning);
                    batchSelect.append(option);
                });

                // Auto-fill Rate
                rateInput.val(data.pts_price);
                
                // Trigger batch change to fill first batch data
                batchSelect.trigger('change');
            });
        });

        batchSelect.on('change', function() {
            const selected = $(this).find('option:selected');
            if (selected.val()) {
                expiryDisplay.val(selected.data('expiry'));
                stockInfo.text(`Available in Batch: ${selected.data('stock')} units`);
                
                if (selected.data('warning')) {
                    expiryWarning.removeClass('d-none');
                } else {
                    expiryWarning.addClass('d-none');
                }
            } else {
                expiryDisplay.val('');
                stockInfo.text('');
                expiryWarning.addClass('d-none');
            }
            calculate();
        });

        function calculate() {
            const qty = parseFloat(qtyInput.val()) || 0;
            const rate = parseFloat(rateInput.val()) || 0;
            totalDisplay.text((qty * rate).toFixed(2));
        }

        qtyInput.on('input', calculate);
        rateInput.on('input', calculate);

        // Validation before submit
        $('#salesForm').on('submit', function(e) {
            const selectedStock = parseFloat(batchSelect.find('option:selected').data('stock')) || 0;
            const enteredQty = parseFloat(qtyInput.val()) || 0;
            
            if (enteredQty > selectedStock) {
                // We let the backend handle the total stock logic, but warn user if single batch is insufficient
                // but our backend uses FIFO, so it will split across batches anyway. 
                // However, for single entry display, transparency is good.
            }
        });
    });
</script>
{% endblock %}
