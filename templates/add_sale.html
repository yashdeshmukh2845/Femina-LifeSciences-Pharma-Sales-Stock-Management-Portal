{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-8 mx-auto">
        <div class="d-flex align-items-center mb-3">
            <a href="{{ url_for('sales.sales_report') }}" class="btn btn-light rounded-circle me-3"><i class="fas fa-arrow-left"></i></a>
            <h2 class="fw-bold mb-0">Add Sales Entry</h2>
        </div>
        
        <div class="card border-0 shadow-sm border-radius-12">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label fw-semibold">Customer Name</label>
                            <input type="text" class="form-control" name="customer_name" placeholder="Enter Customer Name" required>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-semibold">Select Product (from Master)</label>
                            <select class="form-select" name="product_id" required>
                                <option value="" disabled selected>Choose a product...</option>
                                {% for product in products %}
                                <option value="{{ product.id }}">{{ product.product_name }} ({{ product.pack }}) - {{ product.product_code }}</option>
                                {% endfor %}
                            </select>
                            <div class="mt-1">
                                <a href="{{ url_for('product.add_product') }}" class="small text-decoration-none"><i class="fas fa-plus"></i> Add new product to master</a>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Invoice Number</label>
                            <input type="text" class="form-control bg-light" name="invoice_no" value="{{ next_inv }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Date</label>
                            <input type="date" class="form-control" name="date" value="{{ today }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Batch Number</label>
                            <input type="text" class="form-control" name="batch_no" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Quantity</label>
                            <input type="number" class="form-control" name="quantity" id="qty" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Free Quantity</label>
                            <input type="number" class="form-control" name="free_quantity" value="0">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Rate</label>
                            <div class="input-group">
                                <span class="input-group-text">₹</span>
                                <input type="number" step="0.01" class="form-control" name="rate" id="rate" required>
                            </div>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-semibold">Calculated Value</label>
                            <div class="input-group">
                                <span class="input-group-text">₹</span>
                                <input type="text" class="form-control bg-light" id="total_value" readonly>
                            </div>
                        </div>
                        <div class="col-12 mt-4 text-end">
                            <button type="reset" class="btn btn-light me-2">Reset</button>
                            <button type="submit" class="btn btn-primary px-5 shadow-sm">Save Entry</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const qtyInput = document.getElementById('qty');
    const rateInput = document.getElementById('rate');
    const totalInput = document.getElementById('total_value');

    function calculate() {
        const qty = parseFloat(qtyInput.value) || 0;
        const rate = parseFloat(rateInput.value) || 0;
        totalInput.value = (qty * rate).toFixed(2);
    }

    qtyInput.addEventListener('input', calculate);
    rateInput.addEventListener('input', calculate);
</script>
{% endblock %}
