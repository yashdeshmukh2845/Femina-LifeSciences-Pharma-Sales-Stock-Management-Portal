{% block extra_css %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<style>
    .select2-container .select2-selection--single { height: 38px !important; }
    .select2-container--default .select2-selection--single .select2-selection__rendered { line-height: 38px !important; }
    .select2-container--default .select2-selection--single .select2-selection__arrow { height: 36px !important; }
    .expiry-warning { color: red; font-weight: bold; }
</style>
{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-10 mx-auto">
        <div class="d-flex align-items-center mb-3">
            <a href="{{ url_for('sales.sales_report') }}" class="btn btn-light rounded-circle me-3"><i class="fas fa-arrow-left"></i></a>
            <h2 class="fw-bold mb-0">Add Sales Entry</h2>
        </div>
        
        <div class="card border-0 shadow-sm border-radius-12">
            <div class="card-body p-4">
                <form method="POST" id="saleForm">
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label fw-semibold">Customer Name</label>
                            <input type="text" class="form-control" name="customer_name" placeholder="Enter Customer Name" required>
                        </div>
                        <div class="col-md-9">
                            <label class="form-label fw-semibold">Search Product (Name or Code)</label>
                            <select class="form-select select2" name="product_id" id="product_id" required>
                                <option value="" disabled selected>Search Product...</option>
                                {% for product in products %}
                                <option value="{{ product.id }}">{{ product.product_name }} ({{ product.pack }}) - {{ product.product_code }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Invoice Number</label>
                            <input type="text" class="form-control bg-light" name="invoice_no" value="{{ next_inv }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Date</label>
                            <input type="date" class="form-control" name="date" value="{{ today }}">
                        </div>
                        
                        <div class="col-md-5">
                            <label class="form-label fw-semibold">Select Batch <span id="expiryAlert"></span></label>
                            <select class="form-select" name="batch_no" id="batch_select" required>
                                <option value="">Select Product first...</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Expiry Date</label>
                            <input type="text" class="form-control bg-light" name="expiry_display" id="expiry_display" readonly>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Quantity</label>
                            <input type="number" class="form-control" name="quantity" id="qty" required>
                            <div class="form-text text-success" id="stockAvailable"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Free Quantity</label>
                            <input type="number" class="form-control" name="free_quantity" value="0">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Rate (₹)</label>
                            <input type="number" step="0.01" class="form-control" name="rate" id="rate" required>
                        </div>
                        <div class="col-md-12">
                            <div class="p-3 bg-light rounded border">
                                <span class="fw-bold">Total Sales Value: </span>
                                <span class="fs-4 text-primary fw-bold" id="total_display">₹0.00</span>
                            </div>
                        </div>
                        <div class="col-12 mt-4 text-end">
                            <button type="reset" class="btn btn-light me-2">Reset</button>
                            <button type="submit" class="btn btn-primary px-5 shadow-sm btn-lg">Complete Sales Entry</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
    $(document).ready(function() {
        $('.select2').select2({
            placeholder: "Search Product...",
            allowClear: true
        });

        const productSelect = $('#product_id');
        const batchSelect = $('#batch_select');
        const expiryDisplay = $('#expiry_display');
        const qtyInput = $('#qty');
        const rateInput = $('#rate');
        const totalDisplay = $('#total_display');
        const expiryAlert = $('#expiryAlert');
        const stockAvailable = $('#stockAvailable');

        productSelect.on('change', function() {
            const product_id = $(this).val();
            if (!product_id) return;

            // Fetch batches
            fetch(`/api/product-batches/${product_id}`)
                .then(res => res.json())
                .then(data => {
                    batchSelect.empty();
                    if (data.batches.length === 0) {
                        batchSelect.append('<option value="">Out of Stock</option>');
                        expiryDisplay.val('');
                        rateInput.val('');
                        return;
                    }

                    // Auto-fill Rate with PTS
                    rateInput.val(data.pts_price);
                    
                    data.batches.forEach((b, index) => {
                        const alertText = b.days_to_expiry < 60 ? ' ★' : '';
                        const option = `<option value="${b.batch_no}" 
                            data-expiry="${b.expiry_full}" 
                            data-stock="${b.stock}"
                            data-alert="${b.days_to_expiry < 60}"
                            ${index === 0 ? 'selected' : ''}>
                            Batch ${b.batch_no} (Exp: ${b.expiry_date}) - Stock: ${b.stock}${alertText}
                        </option>`;
                        batchSelect.append(option);
                    });

                    batchSelect.trigger('change');
                });
        });

        batchSelect.on('change', function() {
            const selected = $(this).find(':selected');
            expiryDisplay.val(selected.data('expiry'));
            stockAvailable.text(`Stock Available: ${selected.data('stock')}`);
            
            if (selected.data('alert')) {
                expiryAlert.html('<span class="expiry-warning">★ Expiring Soon!</span>');
            } else {
                expiryAlert.empty();
            }
            calculate();
        });

        function calculate() {
            const qty = parseFloat(qtyInput.val()) || 0;
            const rate = parseFloat(rateInput.val()) || 0;
            totalDisplay.text(`₹${(qty * rate).toFixed(2)}`);
        }

        qtyInput.on('input', calculate);
        rateInput.on('input', calculate);
    });
</script>
{% endblock %}
