{% extends "base.html" %}

{% block content %}
<div class="row align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="col-md-6 text-center">
        <div class="display-1 text-danger mb-4"><i class="fas fa-circle-exclamation"></i></div>
        <h1 class="fw-bold text-dark">Something went wrong</h1>
        <p class="text-muted fs-5">{{ message if message else "The server encountered an internal error and was unable to complete your request." }}</p>
        <div class="mt-5">
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary btn-lg px-4"><i class="fas fa-house me-2"></i>Back to Dashboard</a>
            <button onclick="history.back()" class="btn btn-outline-secondary btn-lg px-4 ms-2">Go Back</button>
        </div>
    </div>
</div>
{% endblock %}
