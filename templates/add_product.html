{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-8 mx-auto">
        <div class="d-flex align-items-center mb-3">
            <a href="{{ url_for('product.list_products') }}" class="btn btn-light rounded-circle me-3"><i class="fas fa-arrow-left"></i></a>
            <h2 class="fw-bold mb-0">Add New Product</h2>
        </div>
        
        <div class="card border-0 shadow-sm border-radius-12">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Product Code</label>
                            <input type="text" class="form-control" name="product_code" placeholder="e.g. 11050005" required>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-semibold">Product Name</label>
                            <input type="text" class="form-control" name="product_name" placeholder="e.g. CRAMP OK TAB" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Pack Size</label>
                            <input type="text" class="form-control" name="pack_size" placeholder="e.g. 10'S" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">List Price</label>
                            <input type="number" step="0.01" class="form-control" name="list_price" placeholder="0.00">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">PTS Price</label>
                            <input type="number" step="0.01" class="form-control" name="pts_price" placeholder="0.00">
                        </div>
                        <div class="col-12 mt-4 text-end">
                            <button type="reset" class="btn btn-light me-2">Clear</button>
                            <button type="submit" class="btn btn-primary px-5 shadow-sm">Save Product</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
