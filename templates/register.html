{% extends "base.html" %}

{% block auth_content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="icon"><i class="fas fa-flask"></i></div>
            <h2>FEMINA LIFESCIENCES</h2>
            <p class="text-muted small">Pharma Sales & Stock Management</p>
        </div>
        
        <h4 class="mb-4 text-center fw-bold">Create Account</h4>
        
        <form method="POST">
            <div class="mb-3">
                <label for="full_name" class="form-label">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                    <input type="text" class="form-control border-start-0 bg-light" id="full_name" name="full_name" placeholder="Rajesh Kumar" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                    <input type="email" class="form-control border-start-0 bg-light" id="email" name="email" placeholder="name@company.com" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" class="form-control border-start-0 bg-light" id="password" name="password" placeholder="••••••••" required>
                </div>
            </div>
            <div class="mb-4">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" class="form-control border-start-0 bg-light" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
                </div>
            </div>
            <div class="d-grid mb-4">
                <button type="submit" class="btn btn-primary btn-lg shadow-sm">Register</button>
            </div>
        </form>
        
        <div class="text-center">
            <p class="text-muted small mb-0">Already have an account? <a href="{{ url_for('auth.login') }}" class="text-primary fw-bold text-decoration-none">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
